<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For samira ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen">
    <button onclick="startLove()">Press only if you love me ❤️</button>
</div>

<div id="mainContent" class="hidden">
    <h1 id="message">You are my world 💖</h1>
    <p>Click anywhere...</p>

    <button onclick="openLetter()">💌 Open Secret Letter</button>
    <button onclick="openPuzzle()">🔐 Unlock My Heart</button>

    <div id="timer"></div>

    <div id="slideshow">
        <img id="slideImg" src="a.jpg">
    </div>
</div>

<div id="letter" class="hidden popup">
    <p>
        samira ❤️<br><br>
        No matter how many days pass,<br>
        my heart still finds its way back to you.<br><br>
        You are my forever, my always, my everything. 💕
    </p>
    <button onclick="closeLetter()">Close</button>
</div>

<div id="puzzle" class="hidden popup">
    <h3>Enter Name & Special Date</h3>
    <input id="nameInput" placeholder="Name"><br>
    <input id="dateInput" placeholder="DD-MM-YYYY"><br>
    <button onclick="checkPuzzle()">Unlock</button>
</div>

<div id="surprise" class="hidden popup">
    <h2>You unlocked my heart forever ❤️🔥</h2>
</div>

<audio id="bgMusic" src="love.mp3" loop></audio>

<script src="script.js"></script>
</body>
</html>
